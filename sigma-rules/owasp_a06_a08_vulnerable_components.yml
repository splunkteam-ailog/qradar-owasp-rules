title: OWASP A06/A08 - Vulnerable Components Exploitation Attempt
id: a1b2c3d4-0008-4000-8000-000000000008
status: stable
description: Detects exploitation attempts targeting known vulnerabilities including Log4Shell, Spring4Shell and PHP RCE payloads.
author: Security Team
date: 2024/01/01
modified: 2024/01/01

logsource:
  category: webserver

detection:
  selection:
    c-uri|contains:
      - 'jndi:ldap'
      - 'jndi:rmi'
      - 'jndi:dns'
      - 'class.module.classLoader'
      - 'class.classLoader'
      - 'action%3A'
      - 'php://input'
      - 'php://filter'
      - 'passthru('
      - 'shell_exec('
  condition: selection

falsepositives:
  - Security scanners in authorized test environments

level: critical

tags:
  - attack.initial_access
  - attack.t1190
  - owasp.a06_2021
  - owasp.a08_2021

fields:
  - c-ip
  - c-uri
  - sc-status
  - cs-user-agent
