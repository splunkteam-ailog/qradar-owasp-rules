title: OWASP A06/A08 - Vulnerable Components Exploitation Attempt
id: a1b2c3d4-0008-4000-8000-000000000008
status: stable
description: Detects exploitation attempts targeting known vulnerabilities
author: Security Team
date: 2024-01-01

logsource:
  category: webserver
  service: apache

detection:
  selection:
    c-uri|contains:
      - 'jndi:ldap'
      - 'jndi:rmi'
      - 'jndi:dns'
      - 'class.module.classLoader'
      - 'class.classLoader'
      - 'php://input'
      - 'php://filter'
  condition: selection

level: critical

fields:
  - c-uri
  - cs-user-agent
